version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bookit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookit
      POSTGRES_PASSWORD: bookit123
      POSTGRES_DB: bookit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookit -d bookit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookit_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bookit:bookit123@postgres:5432/bookit
      JWT_SECRET: supersecretjwtkey_changethisinproduction
      PORT: 5000
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookit_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
